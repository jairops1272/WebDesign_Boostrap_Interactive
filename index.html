<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Premium - WebForm</title>
    <link rel="icon" type="image/png" href="./assets/img/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-transparent py-3 fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold tracking-tighter" href="#">
                <i class="fa-solid fa-wand-magic-sparkles text-info me-2"></i>WEBFORM
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3">
                    <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold border border-info rounded-pill px-4 text-info" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5 mt-5">
        <div class="form-card text-center p-5 mx-3 animate-up">
            <span class="badge rounded-pill bg-info bg-opacity-10 text-info mb-3 px-3 py-2 uppercase tracking-widest">Sistemas TecNM 2026</span>
            
            <h2 class="fw-bold display-6 mb-1">Contáctanos</h2>
            <p class="text-muted mb-4">Déjanos tus datos y vive la experiencia digital.</p>

            <form>
                <div class="row g-4">
                    <div class="col-md-6 text-start">
                        <label class="form-label small fw-bold text-uppercase opacity-75">Nombre Completo</label>
                        <div class="input-group premium-input-group">
                            <span class="input-group-text bg-white border-0"><i class="fa-regular fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-0 ps-0" placeholder="Ej. Jairo">
                        </div>
                    </div>
                    <div class="col-md-6 text-start">
                        <label class="form-label small fw-bold text-uppercase opacity-75">Correo Electrónico</label>
                        <div class="input-group premium-input-group">
                            <span class="input-group-text bg-white border-0"><i class="fa-regular fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-0 ps-0" placeholder="correo@ejemplo.com">
                        </div>
                    </div>
                    <div class="col-md-6 text-start">
                        <label class="form-label small fw-bold text-uppercase opacity-75">Número de Teléfono</label>
                        <div class="input-group premium-input-group">
                            <span class="input-group-text bg-white border-0"><i class="fa-solid fa-phone text-muted"></i></span>
                            <input type="tel" class="form-control border-0 ps-0" placeholder="+52 771 123 4567">
                        </div>
                    </div>
                    <div class="col-md-6 text-start">
                        <label class="form-label small fw-bold text-uppercase opacity-75">Asunto</label>
                        <div class="input-group premium-input-group">
                            <span class="input-group-text bg-white border-0"><i class="fa-regular fa-comment-dots text-muted"></i></span>
                            <select class="form-select border-0 ps-0">
                                <option selected disabled>Selecciona el motivo</option>
                                <option>Información</option>
                                <option>Soporte</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12 text-start">
                        <label class="form-label small fw-bold text-uppercase opacity-75">Mensaje</label>
                        <div class="input-group premium-input-group">
                            <span class="input-group-text bg-white border-0 align-items-start pt-3"><i class="fa-solid fa-pen-nib text-muted"></i></span>
                            <textarea class="form-control border-0 ps-0" rows="3" placeholder="Escribe tu mensaje aquí..."></textarea>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-glow-premium mt-5 py-3 w-100 rounded-4 fw-bold">
                    ENVIAR AHORA <i class="fa-solid fa-paper-plane ms-2"></i>
                </button>
            </form>
        </div>
    </main>

    <footer class="footer-glass mt-auto py-4">
        <div class="container text-center text-md-start">
            <div class="row align-items-center">
                <div class="col-md-4 mb-3 mb-md-0">
                    <h5 class="fw-bold text-white mb-0">Programador</h5>
                    <p class="text-light-50 small mb-0">Estudiante de Sistemas - TecNM Pachuca</p>
                </div>
                
                <div class="col-md-4 d-flex justify-content-center mb-3 mb-md-0">
                    <div class="magic-menu-container">
                        <div class="main-node">
                            <i class="fa-brands fa-github"></i>
                        </div>
                        <ul class="floating-items">
                            <li style="--i:1;" data-info="Desarrollador: Jairo">
                                <i class="fa-solid fa-user"></i>
                            </li>
                            <li style="--i:2;" data-info="TecNM Pachuca - Sistemas">
                                <i class="fa-solid fa-graduation-cap"></i>
                            </li>
                            <li style="--i:3;" data-info="Ver Repositorio">
                                <a href="https://jairops1272.github.io/WebDesign_Tailwind-CSS/" target="_blank" class="text-dark">
                                    <i class="fa-solid fa-link"></i>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="col-md-4 text-md-end">
                    <p class="text-light small mb-0">© 2026 Diseñado por Jairo</p>
                    <p class="text-light-50 x-small text-uppercase tracking-wider">Todos los derechos reservados</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
